name: Deploy Kubernetes Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "kubernetes/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and Connect Cloudflare WARP (IPv6 Support)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp+doh
          sudo warp-cli --accept-tos connect
          sleep 3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

          if [ ! -s ~/.kube/config ] || ! grep -q "apiVersion:" ~/.kube/config; then
            echo "=========================================================================="
            echo "ERRO FATAL: O Secret KUBECONFIG não foi encontrado ou está vazio."
            echo "Você precisa ir nas configurações do repositório no GitHub:"
            echo "Settings -> Secrets and variables -> Actions e criar o Secret KUBECONFIG."
            echo "=========================================================================="
            exit 1
          fi
          # Sobrescreve a URL do server no kubeconfig para acessar via VPN (porta nativa K8s: 42893)
          # --minify garante que ele pegue apenas o cluster do contexto atual
          CLUSTER_NAME=$(kubectl config view --minify -o jsonpath='{.clusters[0].name}')
          if [ -z "$CLUSTER_NAME" ]; then
            echo "Erro: O nome do cluster não foi encontrado. O secret KUBECONFIG está configurado corretamente?"
            exit 1
          fi
          kubectl config set-cluster "$CLUSTER_NAME" --server=https://vpn.arthos.dev.br:42893 --insecure-skip-tls-verify=true

      - name: Deploy Manifests
        run: |
          kubectl apply -f kubernetes/namespaces.yaml

          # Inject Secrets dynamically using GitHub Repository Secrets
          kubectl create secret generic personal-infra-secrets \
            --namespace personal-infra \
            --from-literal=HF_TOKEN="${{ secrets.HF_TOKEN }}" \
            --from-literal=CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            --from-literal=PIHOLE_WEBPASSWORD="${{ secrets.PIHOLE_WEBPASSWORD }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=OPENSEARCH_PASSWORD="${{ secrets.OPENSEARCH_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -
            
          kubectl apply -f kubernetes/storage/
          kubectl apply -f kubernetes/workloads/
          kubectl apply -f kubernetes/ingress/
