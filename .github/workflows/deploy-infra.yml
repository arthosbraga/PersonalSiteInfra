name: Deploy Kubernetes Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "kubernetes/**"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure Kubeconfig
        shell: powershell
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          $tempKubeconfig = Join-Path $env:RUNNER_TEMP "kubeconfig"
          $env:KUBECONFIG_DATA | Out-File -FilePath $tempKubeconfig -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "KUBECONFIG=$tempKubeconfig"

          $configContent = ""
          if (Test-Path $tempKubeconfig) {
            $configContent = Get-Content -Path $tempKubeconfig -Raw
          }
          if ([string]::IsNullOrWhiteSpace($configContent) -or $configContent -notmatch "apiVersion:") {
            Write-Host "ERRO FATAL: O Secret KUBECONFIG não foi encontrado ou está vazio."
            exit 1
          }

      - name: Deploy Manifests
        shell: powershell
        run: |
          kubectl apply -f kubernetes/namespaces.yaml
          
          # Install cert-manager platform for SSL
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml
          Start-Sleep -Seconds 30

          # Inject GHCR Pull Secret
          kubectl create secret docker-registry ghcr-login-secret `
            --namespace personal-infra `
            --docker-server=ghcr.io `
            --docker-username=${{ github.actor }} `
            --docker-password="${{ secrets.GITHUB_TOKEN }}" `
            --dry-run=client -o yaml | kubectl apply -f -

          # Inject Secrets dynamically using GitHub Repository Secrets
          kubectl create secret generic personal-infra-secrets `
            --namespace personal-infra `
            --from-literal=HF_TOKEN="${{ secrets.HF_TOKEN }}" `
            --from-literal=CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" `
            --from-literal=PIHOLE_WEBPASSWORD="${{ secrets.PIHOLE_WEBPASSWORD }}" `
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" `
            --from-literal=OPENSEARCH_PASSWORD="${{ secrets.OPENSEARCH_PASSWORD }}" `
            --dry-run=client -o yaml | kubectl apply -f -
            
          kubectl apply -f kubernetes/storage/
          kubectl apply -f kubernetes/workloads/
          kubectl apply -f kubernetes/ingress/
