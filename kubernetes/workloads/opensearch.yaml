apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-node1
  namespace: personal-infra
spec:
  serviceName: opensearch-node1-svc
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
      node: node1
  template:
    metadata:
      labels:
        app: opensearch
        node: node1
    spec:
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:latest
        env:
        - name: cluster.name
          value: opensearch-cluster
        - name: node.name
          value: opensearch-node1
        - name: discovery.seed_hosts
          value: opensearch-node1-svc,opensearch-node2-svc
        - name: cluster.initial_cluster_manager_nodes
          value: opensearch-node1,opensearch-node2
        - name: bootstrap.memory_lock
          value: "true"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms4g -Xmx4g"
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: personal-infra-secrets
              key: OPENSEARCH_PASSWORD
        securityContext:
          privileged: true
        ports:
        - containerPort: 9200
        - containerPort: 9300
        volumeMounts:
        - name: data
          mountPath: /usr/share/opensearch/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: opensearch-data1-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-node1-svc
  namespace: personal-infra
spec:
  selector:
    app: opensearch
    node: node1
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: transport
    port: 9300
    targetPort: 9300

---
