---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: personal-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      containers:
      - name: dashboards
        image: opensearchproject/opensearch-dashboards:latest
        env:
        - name: OPENSEARCH_HOSTS
          value: "[\"https://opensearch-node1-svc:9200\",\"https://opensearch-node2-svc:9200\"]"
        - name: data_source.enabled
          value: "true"
        - name: workspace.enabled
          value: "true"
        - name: explore.enabled
          value: "true"
        ports:
        - containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards-svc
  namespace: personal-infra
spec:
  selector:
    app: opensearch-dashboards
  ports:
  - port: 5601
    targetPort: 5601
