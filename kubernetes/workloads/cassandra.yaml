apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: personal-infra
spec:
  serviceName: cassandra-svc
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
      - name: cassandra
        image: cassandra:latest
        env:
        - name: CASSANDRA_CLUSTER_NAME
          value: "PersonalInfraCluster"
        ports:
        - containerPort: 9042
        volumeMounts:
        - name: cassandra-data
          mountPath: /var/lib/cassandra
  volumeClaimTemplates:
  - metadata:
      name: cassandra-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-svc
  namespace: personal-infra
spec:
  selector:
    app: cassandra
  ports:
  - port: 9042
    targetPort: 9042
